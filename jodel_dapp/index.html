<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jodel 2.0 - Cardano Web3 Test</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; max-width: 600px; margin: auto; background-color: #f9f9f9; }
        .container { background-color: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        button.primary { padding: 12px 24px; font-size: 16px; margin: 10px 5px 10px 0; cursor: pointer; border: none; border-radius: 5px; background-color: #007bff; color: white; transition: background-color 0.2s; }
        button.primary:hover { background-color: #0056b3; }
        #status { margin-top: 20px; padding: 15px; background-color: #e9ecef; border-left: 4px solid #007bff; border-radius: 4px; word-wrap: break-word; line-height: 1.5; }
        .action-area { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; display: none; }
        
        /* Jodel Flutter-ähnliches Design */
        .jodel-card {
            background-color: #4CAF50; /* Grün, wie in deiner Flutter App */
            color: white;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: none; /* Wird erst nach dem Posten angezeigt */
        }
        .jodel-content-area {
            flex-grow: 1;
        }
        .jodel-channel {
            font-size: 15px;
            color: black;
            margin-bottom: 5px;
        }
        .jodel-text {
            font-size: 20px;
            font-weight: bold;
        }
        .jodel-vote-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 40px;
            margin-left: 15px;
        }
        .vote-btn {
            background: none;
            border: none;
            color: black;
            font-size: 24px;
            cursor: pointer;
            padding: 0;
            margin: 0;
            line-height: 1;
            transition: color 0.2s;
        }
        .vote-btn:hover {
            color: #333;
        }
        .karma-number {
            color: #333; /* Graue/Dunkle Zahl */
            font-size: 14px;
            font-weight: bold;
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Jodel 2.0 - Web3</h1>
        <p>Verbinde deine Wallet, um deinen ersten Jodel auf die Cardano Preprod Blockchain zu schreiben!</p>
        
        <button class="primary" id="connectEternlBtn">Connect Eternl Wallet</button>
        <button class="primary" id="connectNamiBtn" style="background-color: #4CAF50;">Connect Nami Wallet</button>
        
        <div id="status"><strong>Status:</strong> Disconnected<br>Warte auf Verbindung...</div>
        
        <div id="actionArea" class="action-area">
            <h3>1. Schreibe deinen Jodel</h3>
            <button class="primary" id="postJodelBtn" style="background-color: #ff9800;">Post Jodel (Lock 2 ADA)</button>
            
            <div class="jodel-card" id="jodelCard">
                <div class="jodel-content-area">
                    <div class="jodel-channel">@Blockchain</div>
                    <div class="jodel-text">Mein erster Web3 Jodel!</div>
                    <div style="font-size: 11px; color: black; margin-top: 10px;">
                        TxHash: <span id="txHashDisplay">Warte auf Post...</span>
                    </div>
                </div>
                <div class="jodel-vote-area">
                    <button class="vote-btn" id="upvoteBtn">▲</button>
                    <div class="karma-number" id="karmaDisplay">0</div>
                    <button class="vote-btn" id="downvoteBtn">▼</button>
                </div>
            </div>
            
            <div id="voteStatus" style="margin-top: 10px; font-size: 14px; color: #666;"></div>
        </div>
    </div>

    <!-- Wir nutzen einen CDN für Lucid 0.10.7 -->
    <script type="module">
        window.onerror = function(msg, source, lineno, colno, error) {
            document.getElementById('status').innerHTML = `<strong style="color:red;">Globaler Fehler:</strong> ${msg} <br> ${error?.stack}`;
            return false;
        };

        import { Lucid, Blockfrost, Data, fromText, Constr } from "https://unpkg.com/lucid-cardano@0.10.7/web/mod.js";
        
        const statusDiv = document.getElementById('status');
        const actionArea = document.getElementById('actionArea');
        const jodelCard = document.getElementById('jodelCard');
        const txHashDisplay = document.getElementById('txHashDisplay');
        const karmaDisplay = document.getElementById('karmaDisplay');
        const voteStatus = document.getElementById('voteStatus');

        let lucidInstance = null;
        let currentKarma = 0;

        // Plutus V2 AlwaysSucceeds Contract
        // Der vorherige (58e601...) war Plutus V3. Da Eternl/Lucid V3 noch nicht 100% unterstützen,
        // nehmen wir hier für den ersten Test einen Plutus V2 Contract, der jeden Vote erlaubt.
        const compiledContractCbor = "49480100002221200101";

        const NoteDatumSchema = Data.Object({
            note_id: Data.Bytes(),
            karma: Data.Integer(),
        });

        // Echter Blockfrost Provider für das Testnetz (Preprod)
        const blockfrostKey = "preprod8ysh4eKjL2DKIDaWwhPlLnBhrIPMGudr";
        const provider = new Blockfrost("https://cardano-preprod.blockfrost.io/api/v0", blockfrostKey);

        // Wir fangen Fehler beim Blockfrost Provider ab, um dir genau zu sagen, was los ist
        const originalGetParameters = provider.getProtocolParameters.bind(provider);
        provider.getProtocolParameters = async () => {
            try {
                const params = await originalGetParameters();
                if (!params) throw new Error("Keine Parameter empfangen");
                return params;
            } catch (e) {
                if (blockfrostKey.startsWith("testnet")) {
                    throw new Error("Dein Blockfrost API-Key ist für das alte 'Testnet' (startet mit 'testnet...'). Du musst in Blockfrost ein neues Projekt erstellen und als Netzwerk zwingend 'Preprod' auswählen! Der Key muss mit 'preprod...' anfangen.");
                }
                throw e;
            }
        };

        async function connectWallet(walletName) {
            statusDiv.innerHTML = `<strong>Status:</strong> Verbinde mit ${walletName}...`;
            
            try {
                if (!window.cardano || !window.cardano[walletName.toLowerCase()]) {
                    throw new Error("Wallet nicht gefunden");
                }

                const api = await window.cardano[walletName.toLowerCase()].enable();
                
                // Nutze den echten Blockfrost Provider!
                lucidInstance = await Lucid.new(provider, "Preprod"); 
                
                lucidInstance.selectWallet(api);

                const address = await lucidInstance.wallet.address();

                statusDiv.innerHTML = `
                    <strong>Status: Verbunden! 🚀</strong><br>
                    <strong>Adresse:</strong> <span style="font-size: 11px; word-break: break-all;">${address}</span>
                `;
                
                actionArea.style.display = 'block';

            } catch (error) {
                console.error("Connection Error:", error);
                statusDiv.innerHTML = `<strong>Fehler:</strong> ${error.message || error} <br> ${error.stack || ''}`;
            }
        }

        async function postJodelToContract() {
            try {
                statusDiv.innerHTML = `<strong>Status:</strong> Baue Transaktion... (Bitte gleich in der Wallet unterschreiben)`;

                const validator = { type: "PlutusV2", script: compiledContractCbor };
                const contractAddress = lucidInstance.utils.validatorToAddress(validator);
                
                const jodelId = fromText("jodel-001");
                const datum = Data.to(
                    { note_id: jodelId, karma: 0n },
                    NoteDatumSchema
                );

                const tx = await lucidInstance.newTx()
                    .payToContract(contractAddress, { inline: datum }, { lovelace: 2000000n })
                    .complete();

                const signedTx = await tx.sign().complete();
                
                // Jetzt können wir das Senden direkt über Lucid und Blockfrost machen!
                const txHash = await signedTx.submit();

                statusDiv.innerHTML = `
                    <strong style="color: green;">🎉 Erfolg! Dein Jodel ist auf der Blockchain!</strong><br><br>
                    <strong>TxHash:</strong><br>
                    <a href="https://preprod.cardanoscan.io/transaction/${txHash}" target="_blank" style="font-size: 12px; word-break: break-all;">${txHash}</a>
                `;
                
                // Jodel Card anzeigen und Hash eintragen!
                jodelCard.style.display = 'flex';
                txHashDisplay.innerText = txHash.substring(0, 15) + '...';
                currentKarma = 0;
                karmaDisplay.innerText = currentKarma;

            } catch (error) {
                console.error("Tx Error:", error);
                statusDiv.innerHTML = `<strong>Transaktions-Fehler:</strong> ${error.message || error.info || error} <br> ${error.stack || ''}`;
            }
        }

        async function simulateVote(change) {
            try {
                // UI Feedback sofort (Optimistic Update)
                const previousKarma = currentKarma;
                currentKarma += change;
                karmaDisplay.innerText = currentKarma;
                if (navigator.vibrate) navigator.vibrate(50);
                karmaDisplay.style.color = currentKarma > 0 ? '#ff9800' : (currentKarma < 0 ? '#ff3b30' : '#333');
                
                voteStatus.innerHTML = `<span style="color: blue;">Baue Voting-Transaktion... (Bitte in Wallet signieren)</span>`;

                const validator = { type: "PlutusV2", script: compiledContractCbor };
                const contractAddress = lucidInstance.utils.validatorToAddress(validator);
                
                // 1. Finde den aktuellen Jodel UTXO auf dem Smart Contract
                const utxos = await lucidInstance.utxosAt(contractAddress);
                
                // Wir suchen den UTXO, der zu unserem jodel-001 gehört.
                // Da wir das Datum inline gespeichert haben, können wir es direkt auslesen.
                const jodelIdHex = fromText("jodel-001");
                
                const jodelUtxo = utxos.find(utxo => {
                    if (utxo.datum) {
                        try {
                            const parsedDatum = Data.from(utxo.datum, NoteDatumSchema);
                            return parsedDatum.note_id === jodelIdHex;
                        } catch (e) { return false; }
                    }
                    return false;
                });

                if (!jodelUtxo) {
                    throw new Error("Jodel UTXO nicht auf dem Contract gefunden! Hast du ihn schon gepostet oder ist die Tx noch nicht bestätigt?");
                }

                // Aktuelles Karma aus dem UTXO lesen zur Sicherheit
                const parsedDatum = Data.from(jodelUtxo.datum, NoteDatumSchema);
                const oldKarma = parsedDatum.karma;
                const newKarma = oldKarma + BigInt(change);

                // 2. Neues Datum für den geupdateten Jodel bauen
                const newDatum = Data.to(
                    { note_id: jodelIdHex, karma: newKarma },
                    NoteDatumSchema
                );

                // 3. Redeemer (Die Aktion: Upvote oder Downvote) definieren
                // In unserem Aiken Code: type VoteAction { Upvote, Downvote }
                // Constructor 0 = Upvote, Constructor 1 = Downvote
                const actionIndex = change > 0 ? 0 : 1;
                // Lucid 0.10.x nutzt Data.to(new Constr(index, [])) aber Constr wird von Lucid nicht direkt exportiert
                // Wir nutzen daher die Data.Object Syntax, falls möglich, oder importieren Constr
                const redeemer = Data.to(new Constr(actionIndex, []));

                // 4. Transaktion bauen: 
                // - Wir konsumieren (collect) den alten UTXO und rufen den Validator auf (mit dem Redeemer)
                // - Wir erzeugen einen neuen UTXO an derselben Adresse mit dem neuen Datum (payToContract)
                const tx = await lucidInstance.newTx()
                    .collectFrom([jodelUtxo], redeemer)
                    .attachSpendingValidator(validator)
                    .payToContract(contractAddress, { inline: newDatum }, { lovelace: jodelUtxo.assets.lovelace })
                    .complete();

                // 5. Signieren und Senden
                const signedTx = await tx.sign().complete();
                const txHash = await signedTx.submit();

                voteStatus.innerHTML = `<span style="color: green;">Vote erfolgreich auf der Blockchain! <a href="https://preprod.cardanoscan.io/transaction/${txHash}" target="_blank">TxHash</a></span>`;
                
                // Warten, bis die Tx wirklich in einem Block ist (optional, aber cool für die UX)
                // await lucidInstance.awaitTx(txHash);

            } catch (error) {
                console.error("Vote Error:", error);
                // Rollback UI
                currentKarma -= change;
                karmaDisplay.innerText = currentKarma;
                karmaDisplay.style.color = currentKarma > 0 ? '#ff9800' : (currentKarma < 0 ? '#ff3b30' : '#333');
                voteStatus.innerHTML = `<span style="color: red;">Vote fehlgeschlagen: ${error.message || error.info || error}</span>`;
            }
        }

        document.getElementById('connectEternlBtn').addEventListener('click', () => connectWallet('Eternl'));
        document.getElementById('connectNamiBtn').addEventListener('click', () => connectWallet('Nami'));
        document.getElementById('postJodelBtn').addEventListener('click', postJodelToContract);
        
        document.getElementById('upvoteBtn').addEventListener('click', () => simulateVote(1));
        document.getElementById('downvoteBtn').addEventListener('click', () => simulateVote(-1));
    </script>
</body>
</html>
